<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senaqo Vector Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-900 text-white min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-zinc-800 p-8 rounded-xl shadow-2xl border border-zinc-700">
        <h1 class="text-3xl font-bold mb-1 text-amber-500 text-center tracking-wide">VECTOR<span class="text-white">GEN</span></h1>
        <p class="text-zinc-400 text-xs mb-8 text-center uppercase tracking-widest">Premium Digitizing Tool</p>
        
        <label class="block text-sm font-medium text-zinc-300 mb-2">Deskripsi Gambar</label>
        <input type="text" id="prompt" placeholder="Contoh: Motif naga emas gaya Eropa..." 
               class="w-full p-4 rounded-lg bg-zinc-900 border border-zinc-600 mb-6 focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500 transition">
        
        <button onclick="generate()" id="btn" class="w-full bg-amber-600 hover:bg-amber-500 text-white font-semibold py-4 rounded-lg transition shadow-lg">
            Proses & Jahit Vektor
        </button>

        <div id="status" class="mt-6 hidden flex flex-col items-center justify-center space-y-3">
            <div class="animate-spin inline-block w-8 h-8 border-4 border-amber-500 border-t-transparent rounded-full"></div>
            <p class="text-sm text-zinc-400">Memproses gambar menjadi path vektor...</p>
        </div>

        <div id="result" class="mt-6 hidden">
            <div class="bg-green-900/30 border border-green-500/50 p-4 rounded-lg text-center">
                <p class="text-green-400 text-sm mb-3">✓ Vektor berhasil dibuat!</p>
                <a id="dl_link" href="#" class="inline-block bg-green-600 hover:bg-green-500 text-white px-6 py-2 rounded font-medium transition w-full">
                    Unduh File SVG
                </a>
            </div>
        </div>
    </div>

    <script>
        async function generate() {
            const prompt = document.getElementById('prompt').value;
            const btn = document.getElementById('btn');
            const status = document.getElementById('status');
            const result = document.getElementById('result');

            if(!prompt) return alert("Masukkan deskripsi desain yang diinginkan!");

            btn.disabled = true;
            btn.classList.add('opacity-50', 'cursor-not-allowed');
            status.classList.remove('hidden');
            result.classList.add('hidden');

            try {
                const res = await fetch(`/api/generate?prompt=${encodeURIComponent(prompt)}`);
                const data = await res.json();
                
                if(data.vector_url) {
                    document.getElementById('dl_link').href = data.vector_url;
                    result.classList.remove('hidden');
                } else {
                    alert("Gagal memproses gambar.");
                }
            } catch (err) {
                alert("Terjadi kesalahan pada server.");
                console.error(err);
            } finally {
                btn.disabled = false;
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
                status.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
